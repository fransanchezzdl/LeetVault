name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leetvault_desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: leetvault_desktop/package-lock.json

      - name: Install deps
        # --ignore-scripts skips better-sqlite3's prebuild dance; we only need
        # the Node-ABI binary for vitest, which the next step builds explicitly.
        run: npm ci --ignore-scripts

      - name: Rebuild better-sqlite3 for Node
        run: npm rebuild better-sqlite3

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
